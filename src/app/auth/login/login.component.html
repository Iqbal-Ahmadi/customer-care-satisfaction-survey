<div class="login-wrapper">
  <mat-card class="login-card">
    <!-- Login form for LDAP-authenticated users (mocked for now). -->
    <mat-card-header>
      <mat-card-title>Sign in</mat-card-title>
      <mat-card-subtitle>Use your employee credentials.</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <!-- Username input. -->
        <mat-form-field appearance="outline">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" autocomplete="username" />
          @if (form.controls.username.touched && form.controls.username.hasError('required')) {
            <mat-error>Username is required.</mat-error>
          }
        </mat-form-field>

        <!-- Password input. -->
        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          @if (form.controls.password.touched && form.controls.password.hasError('required')) {
            <mat-error>Password is required.</mat-error>
          }
        </mat-form-field>
      </form>

      <!-- Mock hint for admin roles during development. -->
      <!-- <div class="mock-hint">
        <mat-icon>info</mat-icon>
        <span>Mock login: include “admin” or “super” in username to get admin roles.</span>
      </div> -->
    </mat-card-content>

    <mat-card-actions align="end">
      <button
        mat-raised-button
        color="primary"
        type="button"
        [disabled]="loading"
        (click)="submit()"
      >
        @if (loading) {
          <mat-progress-spinner diameter="18" mode="indeterminate"></mat-progress-spinner>
        } @else {
          Login
        }
      </button>
    </mat-card-actions>
  </mat-card>
</div>
