<mat-toolbar class="top-nav">
  <!-- Sticky navbar container. -->
  <div class="nav-container">
    <a class="brand" routerLink="/surveys">
      <img src="assets/images/e& af-logo.png" alt="e& AF" class="brand-logo">
      <!-- <span>Employee Survey Portal</span> -->
    </a>

    <span class="nav-links">
      <a routerLink="/surveys">Surveys</a>

      @if (user$ | async; as user) {
      @if (user.role === 'ADMIN' || user.role === 'SUPER_ADMIN') {
      <a routerLink="/admin">Admin</a>
      }
      }
    </span>

    <span class="spacer"></span>

    @if (user$ | async; as user) {
    <span class="user-pill">
      <mat-icon>account_circle</mat-icon>
      <span>{{ user.name }}</span>
      <span class="role">{{ user.role }}</span>
    </span>
    <button mat-stroked-button type="button" (click)="logout()">Logout</button>
    }
  </div>
</mat-toolbar>
